<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmax Architexture | لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0f2027; 
            --accent-blue: #3498db;
            --pure-gold: #D4AF37;
            --white-fade: rgba(255, 255, 255, 0.45);
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; 
            height: 100vh;
            width: 100%;
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at center, #203a43 0%, #0f2027 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center; 
            overflow: hidden; 
        }

        .main-wrapper { 
            text-align: center; 
            width: 100%;
            max-width: 480px; 
            padding: 15px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            justify-content: flex-start;
            padding-top: 40px;
        }

        .master-logo { margin-bottom: 5px; width: 100%; } 
        .logo-text {
            font-size: clamp(3.5em, 12vw, 5em); 
            font-weight: 900;
            margin: 0;
            line-height: 0.85;
            letter-spacing: 5px;
        }
        .max-text { color: var(--pure-gold); text-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        .hub-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 5px;
        }
        .hub-line {
            width: 180px;
            height: 2px;
            background: rgba(212, 175, 55, 0.3);
            margin-bottom: 5px;
        }
        
        .status-tag { 
            font-size: 0.75em; 
            color: #2ecc71; 
            margin: 5px 0 2px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-weight: 700;
        }
        .status-dot {
            width: 6px; height: 6px;
            background-color: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 6px #2ecc71;
        }

        /* كتابة المرحلة الدراسية والتفاصيل المتغيرة بخط صغير وأبيض خفيف أسفل الخط الثابت */
        .academic-info {
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
            font-weight: 400;
            min-height: 20px;
        }

        /* حاوية الأزرار المدمجة والديناميكية */
        .menu-container {
            width: 100%;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px; 
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* إخفاء شريط التمرير الافتراضي */
        .menu-container::-webkit-scrollbar { width: 4px; }
        .menu-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .gmax-btn {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px 15px; 
            color: #ffffff;
            font-size: 1.1em; 
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center; 
            transition: all 0.2s ease;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .gmax-btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.06);
        }

        .section-divider {
            width: 50%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            margin: 15px 0;
            align-self: center;
        }

        .back-btn {
            border-color: rgba(212, 175, 55, 0.3);
        }
        .back-btn:hover {
            border-color: var(--pure-gold);
        }

        @media (max-width: 480px) {
            .logo-text { font-size: 3.5em; }
            .gmax-btn { font-size: 1em; padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="master-logo">
            <h1 class="logo-text">
                <span>G</span><span class="max-text">MAX</span>
            </h1>            
            <div class="hub-area">
                <div class="hub-line"></div>
                <div class="status-tag"><span class="status-dot"></span>متصل الآن</div>
            </div>            
            
            <div class="academic-info" id="academicInfo">جاري تحميل البنية التحتية...</div>
        </div>

        <div class="menu-container" id="mainMenuContainer"></div>

    </div>

    <script>
        // إعدادات جلب البيانات من مستودع جيت هاب الخاص بك
        const REPO_BASE_URL = "https://raw.githubusercontent.com/techniquepuits/bac/main/";
        
        let navigationData = null;
        let imagesMapData = null;
        
        // مسار الحفظ لتتبع شجرة العودة إلى الخلف للخلف
        let navigationHistory = [];

        // أولاً: الاتصال التلقائي عند فتح الصفحة لقراءة الملفين المرجعيين
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const [navResponse, imgResponse] = await Promise.all([
                    fetch(REPO_BASE_URL + 'json01_gmax_navigation_map.json'),
                    fetch(REPO_BASE_URL + 'json02_gmax_images_map.json')
                ]);

                if (!navResponse.ok || !imgResponse.ok) throw new Error("فشل في قراءة ملفات البنية التحتية.");

                navigationData = await navResponse.json();
                imagesMapData = await imgResponse.json();

                // عند النجاح، نعرض الجذور مباشرة
                showBranches();
            } catch (error) {
                console.error(error);
                document.getElementById('academicInfo').innerText = "❌ خطأ في الاتصال بالسيرفر.";
            }
        });

        // 1. عرض الجذور المتاحة (Branches) مرتبة حسب المعرف (ID)
        function showBranches() {
            navigationHistory = []; // تصفير التاريخ
            updateAcademicInfo("المرحلة الثانوية • بكالوريا 2027");
            
            const container = document.getElementById('mainMenuContainer');
            container.innerHTML = ""; // مسح كامل وتفريغ اللوحة

            const sortedBranchIds = Object.keys(navigationData).sort();
            
            sortedBranchIds.forEach(brId => {
                const btn = document.createElement('div');
                btn.className = 'gmax-btn';
                // بما أن القاموس مدمج داخل شجرة التنقل أو المعرف يعبر عن نفسه، نعرض اسم الجذر مباشرة
                btn.innerHTML = `<span>📂 شعبة: ${brId}</span>`;
                btn.onclick = () => {
                    navigationHistory.push({ type: 'branches' });
                    showModules(brId);
                };
                container.appendChild(btn);
            });
        }

        // 2. عرض المواد التابعة للجذر المحدد (Modules)
        function showModules(brId) {
            updateAcademicInfo(`الشعبة: ${brId}`);
            const container = document.getElementById('mainMenuContainer');
            container.innerHTML = ""; // تفريغ كامل وفوري للوحة لمنع اختلاط الأزرار الأخوة

            const modules = navigationData[brId].modules;
            const sortedModuleIds = Object.keys(modules).sort();

            sortedModuleIds.forEach(modId => {
                const btn = document.createElement('div');
                btn.className = 'gmax-btn';
                btn.innerHTML = `<span>📚 مادة: ${modId} (${modules[modId].module_tag})</span>`;
                btn.onclick = () => {
                    navigationHistory.push({ type: 'modules', brId: brId });
                    showAxes(brId, modId);
                };
                container.appendChild(btn);
            });

            addBackButton(() => showBranches());
        }

        // 3. عرض المحاور (Axes)
        function showAxes(brId, modId) {
            updateAcademicInfo(`الشعبة: ${brId} • المادة: ${modId}`);
            const container = document.getElementById('mainMenuContainer');
            container.innerHTML = ""; 

            const axes = navigationData[brId].modules[modId].axes;
            
            axes.forEach(axe => {
                const btn = document.createElement('div');
                btn.className = 'gmax-btn';
                btn.innerHTML = `<span>🎯 محور: ${axe.axe_id} (${axe.axe_tag})</span>`;
                btn.onclick = () => {
                    navigationHistory.push({ type: 'axes', brId: brId, modId: modId });
                    showMilestones(brId, modId, axe.axe_id);
                };
                container.appendChild(btn);
            });

            addBackButton(() => showModules(brId));
        }

        // 4. عرض الوحدات الدروسية (Milestones)
        function showMilestones(brId, modId, axeId) {
            updateAcademicInfo(`المادة: ${modId} • المحور: ${axeId}`);
            const container = document.getElementById('mainMenuContainer');
            container.innerHTML = "";

            const axe = navigationData[brId].modules[modId].axes.find(a => a.axe_id === axeId);
            
            axe.milestones.forEach(miles => {
                const btn = document.createElement('div');
                btn.className = 'gmax-btn';
                btn.innerHTML = `<span>📖 وحدة: ${miles.milestones_id}</span>`;
                btn.onclick = () => {
                    navigationHistory.push({ type: 'milestones', brId: brId, modId: modId, axeId: axeId });
                    showLevels(brId, modId, axeId, miles.milestones_id);
                };
                container.appendChild(btn);
            });

            addBackButton(() => showAxes(brId, modId));
        }

        // 5. عرض المستويات الثلاثة المبنية للوحدة (Levels)
        function showLevels(brId, modId, axeId, milesId) {
            updateAcademicInfo(`الوحدة: ${milesId}`);
            const container = document.getElementById('mainMenuContainer');
            container.innerHTML = "";

            const axe = navigationData[brId].modules[modId].axes.find(a => a.axe_id === axeId);
            const milestone = axe.milestones.find(m => m.milestones_id === milesId);
            const sortedLevelIds = Object.keys(milestone.levels).sort();

            sortedLevelIds.forEach(lvlId => {
                const btn = document.createElement('div');
                btn.className = 'gmax-btn';
                
                // تسميات المستويات الثابتة حسب سياق بكالوريا جيماكس المنظم
                let lvlName = "المستوى التجريبي";
                if(lvlId == "01" || lvlId.endsWith("1")) lvlName = "💪 المستوى 1: تعزيز المفاهيم والفوكال";
                if(lvlId == "02" || lvlId.endsWith("2")) lvlName = "🧠 المستوى 2: التمارين التركيبية المدمجة";
                if(lvlId == "03" || lvlId.endsWith("3")) lvlName = "📝 المستوى 3: محاكاة الامتحان والباك";

                btn.innerHTML = `<span>${lvlName}</span>`;
                btn.onclick = () => {
                    navigationHistory.push({ type: 'levels', brId: brId, modId: modId, axeId: axeId, milesId: milesId });
                    showExercises(brId, modId, axeId, milesId, lvlId);
                };
                container.appendChild(btn);
            });

            addBackButton(() => showMilestones(brId, modId, axeId));
        }

        // 6. عرض قائمة التمارين التابعة للمستوى المختار
        function showExercises(brId, modId, axeId, milesId, lvlId) {
            updateAcademicInfo(`الوحدة: ${milesId} • المستوى: ${lvlId}`);
            const container = document.getElementById('mainMenuContainer');
            container.innerHTML = "";

            const axe = navigationData[brId].modules[modId].axes.find(a => a.axe_id === axeId);
            const milestone = axe.milestones.find(m => m.milestones_id === milesId);
            const exercises = milestone.levels[lvlId].exercises;

            exercises.forEach(ex => {
                if (ex.exercise_status !== "active") return; // تجاهل التمارين المؤرشفة
                
                const btn = document.createElement('div');
                btn.className = 'gmax-btn';
                btn.innerHTML = `<span>📝 تمرين: ${ex.exercise_name || ex.exercise_id}</span>`;
                btn.onclick = () => {
                    navigationHistory.push({ type: 'exercises', brId: brId, modId: modId, axeId: axeId, milesId: milesId, lvlId: lvlId });
                    handleExerciseSelection(ex);
                };
                container.appendChild(btn);
            });

            addBackButton(() => showLevels(brId, modId, axeId, milesId));
        }

        // 7. معالجة وتدقيق تمرين الصور المختار وعرض أزراره الثلاثة
// 7. معالجة وتدقيق تمرين الصور المختار مع دعم كامل للمجلدات الفرعية (مثل MA)
function handleExerciseSelection(ex) {
    if (ex.exercise_type === "image" || ex.exercise_type === "html") { 
        const exId = ex.exercise_id;
        
        // 1. المحاولة الأولى: قراءة المسار المباشر من ملف json02 المجلوب من GitHub
        let imgRecord = imagesMapData ? imagesMapData[exId] : null;
        
        if (imgRecord && imgRecord.text_image_path) {
            // إذا وُجد في الجيسون، نمرر المسار كاملًا كما هو (بما فيه مجلد MA أو غيره)
            displayImageExerciseDashboard(exId, imgRecord.text_image_path, imgRecord.correction_image_path);
        } else {
            // 2. المحاولة الثانية (الخطة البديلة العبقرية): إذا غاب عن الجيسون أو تأخر الكاش
            console.warn(`⚠️ المعرف ${exId} غير مفهرس، تم تشغيل الاستنتاج الشجري للمسار.`);
            
            // استنتاج المجلد الفرعي تلقائياً من اسم الأيدي (مثال: SC_ma_25_H_04 يحتوي على _ma_ إذن المجلد هو MA)
            let subFolder = "";
            let lowerId = exId.toLowerCase();
            if (lowerId.includes("_ma_")) subFolder = "MA/";
            else if (lowerId.includes("_ph_")) subFolder = "PH/";
            else if (lowerId.includes("_sc_")) subFolder = "SC/";
            
            // تفكيك الاسم لصناعة أيدي التصحيح بإضافة s قبل المطة الأخيرة
            let lastUnderscoreIndex = exId.lastIndexOf('_');
            let correctionId = exId;
            if (lastUnderscoreIndex !== -1) {
                correctionId = exId.substring(0, lastUnderscoreIndex) + 's' + exId.substring(lastUnderscoreIndex);
            }
            
            // بناء المسار الديناميكي الصحيح المتوافق مع الهيكل المرفوع
            const fallbackTextPath = `assets/60_ex_webp/${subFolder}${exId}.webp`;
            const fallbackCorrectPath = `assets/60_ex_webp/${subFolder}${correctionId}.webp`;
            
            displayImageExerciseDashboard(exId, fallbackTextPath, fallbackCorrectPath);
        }
    } else {
        alert("💡 هذا التمرين يعتمد صيغة عرض نصية مختلفة.");
    }
}

// 8. عرض لوحة التحكم النهائية للتمرين وتوليد الروابط بشكل صحيح مع الرابط الأساسي المستودع
function displayImageExerciseDashboard(exId, textImgPath, correctionImgPath) {
    updateAcademicInfo(`استعراض التمرين: ${exId}`);
    const container = document.getElementById('mainMenuContainer');
    container.innerHTML = ""; // تفريغ كامل ومطلق للشاشة

    // التأكد من عدم تكرار الرابط الأساسي إذا كان مخزناً كاملاً في الجيسون
    const fullTextUrl = textImgPath.startsWith('http') ? textImgPath : `${REPO_BASE_URL}${textImgPath}`;
    const fullCorrectUrl = correctionImgPath.startsWith('http') ? correctionImgPath : `${REPO_BASE_URL}${correctionImgPath}`;

    // الزر الأول: فتح واستعراض نص التمرين
    const btnText = document.createElement('a');
    btnText.className = 'gmax-btn';
    btnText.target = '_blank';
    // استخدام الهيكل المتوافق مع بريفيو جيت هاب أو العرض المباشر للويب بـ webp
    btnText.href = fullTextUrl;
    btnText.innerHTML = `<span>📄 استعراض نص التمرين</span>`;
    container.appendChild(btnText);

    // الزر الثاني: فتح واستعراض تصحيح التمرين
    const btnCorrect = document.createElement('a');
    btnCorrect.className = 'gmax-btn';
    btnCorrect.target = '_blank';
    btnCorrect.href = fullCorrectUrl;
    btnCorrect.innerHTML = `<span>💡 استعراض تصحيح التمرين</span>`;
    container.appendChild(btnCorrect);

    // فاصل تجميلي مبسط للوحة التحكم
    const divider = document.createElement('div');
    divider.className = 'section-divider';
    container.appendChild(divider);

    // الزر الثالث: العودة الفورية المباشرة إلى الفهرس الرئيسي
    const btnHome = document.createElement('div');
    btnHome.className = 'gmax-btn back-btn';
    btnHome.innerHTML = `<span>🏠 العودة إلى الفهرس الرئيسي</span>`;
    btnHome.onclick = () => showBranches();
    container.appendChild(btnHome);
}

        // أدوات مساعدة مرنة لإدارة وحقن واجهة العودة والنصوص الخفيفة
        function updateAcademicInfo(text) {
            document.getElementById('academicInfo').innerText = text;
        }

        function addBackButton(previousStepFunction) {
            const container = document.getElementById('mainMenuContainer');
            
            const divider = document.createElement('div');
            divider.className = 'section-divider';
            container.appendChild(divider);

            const backBtn = document.createElement('div');
            backBtn.className = 'gmax-btn back-btn';
            backBtn.innerHTML = `<span>🔙 عودة للخلف</span>`;
            backBtn.onclick = previousStepFunction;
            container.appendChild(backBtn);
        }
    </script>
</body>
</html>
