<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GMax Bac - لوحة مراجعة التمارين</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 10px; margin: 0; transition: 0.3s; }
        .container { max-width: 800px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        body.fullscreen-mode { padding: 0; background: white; }
        body.fullscreen-mode .container { max-width: 100%; width: 100vw; height: 100vh; border-radius: 0; padding: 10px; overflow-y: auto; box-sizing: border-box; }

        .section { margin-bottom: 2px; padding: 2px; border-bottom: 1px solid #eee; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        
        button { 
            padding: 12px 15px; border: none; border-radius: 8px; cursor: pointer; 
            font-weight: bold; transition: 0.2s; background: #34495e; color: white; 
            font-size: 14px; min-width: 80px; flex-grow: 1; max-width: 250px;
        }

        .btn-branch { max-width: 250px; width: 32%; }
        .btn-mod { max-width: 200px; width: 30%; }
        .btn-axes { max-width: 400px; width: 51%; text-align: right; }

        /* المنطق الموحد للاختيار النشط */
        .active-selection { background: #f39c12 !important; border: 2px solid #e67e22; }

        .status-1 { background-color: #2ecc71 !important; }
        .status-3 { background-color: #e74c3c !important; }
        
        .display-area { text-align: center; margin-top: 15px; border-top: 2px dashed #ccc; padding-top: 15px; }
        #exercise-id-display { color: #2c3e50; background: #ecf0f1; padding: 5px 15px; border-radius: 20px; display: inline-block; margin-bottom: 10px; font-weight: bold; }
        
        img { max-width: 98%; height: auto; border: 0.5px solid #333; margin-top: 10px; border-radius: 8px; background: white; padding: 5px; }
        
        .control-panel { margin-top: 20px; background: #f9f9f9; padding: 15px; border-radius: 8px; display: flex; gap: 10px; justify-content: center; }
        
        .btn-red { background: #e74c3c; }
        .btn-green { background: #2ecc71; }
        .btn-gray { background: #95a5a6; }
        
        /* الأزرار الزرقاء الافتراضية */
        #btn-show-ex, #btn-show-corr { background: #2980b9; padding: 10px; flex-grow: 2; }

        #focus-header { 
            display: none; width: 100%; justify-content: space-between; align-items: center; 
            background: #2c3e50; color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box;
        }
        .btn-back { background: #e67e22 !important; max-width: 50px; padding: 5px; font-size: 14px; }

        #loading-overlay { text-align: center; color: #7f8c8d; font-weight: bold; padding: 20px; }

        @media (max-width: 600px) {
            button { font-size: 12px; padding: 10px; }
            #focus-header { font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div id="loading-overlay">جاري تحميل البيانات والربط بين القاموس وخريطة التنقل...</div>

    <div id="navigation-panels" style="display: none;">
        <div id="branches-section" class="section"><div id="branches-list" class="section"></div></div>
        <div id="modules-section" class="section"><div id="modules-list" class="section"></div></div>
        <div id="axes-section" class="section"><div id="axes-list" class="section"></div></div>
    </div>

    <div id="focus-header">
        <span id="focus-axe-name" style="font-weight: bold;"></span>
        <button class="btn-back" onclick="exitFocusMode()">⬅ عودة</button>
    </div>

    <div id="exercises-section" class="section" style="display:none;">
        <h4 style="width:100%; text-align:center; margin:5px 0; color: #7f8c8d;">التمارين المتوفرة للمحور</h4>
        <div id="exercises-list" class="section"></div>
    </div>

    <div id="viewer" class="display-area" style="display:none;">
        <div class="nav-controls-wrapper">
            <div class="section" style="border:none;" id="viewer-controls">
                <button onclick="showImage('exercise')" id="btn-show-ex">📄 التمرين</button>
                <button onclick="showImage('correction')" id="btn-show-corr">💡 التصحيح</button>
            </div>
        </div>

        <div id="image-container">
            <img id="main-image" src="" alt="جاري التحميل...">
        </div>

        <div class="control-panel">
            <button class="btn-red" onclick="updateStatus(3)">❌ مراجعة</button>
            <button class="btn-green" onclick="updateStatus(1)">✅ جيد</button>
            <button class="btn-gray" onclick="updateStatus(0)">⚪ إلغاء</button>
        </div>
        <div id="exercise-id-display">ID: <span id="id-text"></span></div>
    </div>
</div>

<script>
// تحديد مسارات جلب ملفات الـ JSON المتواجدة معك بنفس المجلد على المستودع
const PATH_NAV_MAP = "./json01_navigation_map.json";
const PATH_DICTIONARY = "./json00_IDs_dictionary.json";
const CLOUDINARY_BASE_URL = "https://github.com/techniquepuits/bac/blob/main/assets/61_ex_webp/";

let navigationData = {};
let dictionaryData = {};
let localStatuses = JSON.parse(localStorage.getItem('gmax_exercises_status')) || {};

let currentExerciseId = null;
let currentCorrectionId = null;
let currentAxeLabel = "";

// بدء قراءة وجلب الملفات بمجرد إقلاع وتحميل صفحة المتصفح
window.addEventListener('DOMContentLoaded', () => {
    Promise.all([
        fetch(PATH_NAV_MAP).then(res => res.json()),
        fetch(PATH_DICTIONARY).then(res => res.json())
    ])
    .then(([navJson, dictJson]) => {
        navigationData = navJson;
        dictionaryData = dictJson;
        
        // إخفاء عبارة التحميل وتجهيز الألواح
        document.getElementById('loading-overlay').style.display = 'none';
        document.getElementById('navigation-panels').style.display = 'block';
        
        renderBranches();
    })
    .catch(err => {
        console.error("خطأ أثناء جلب الملفات المرجعية:", err);
        document.getElementById('loading-overlay').textContent = "❌ خطأ: فشل استحضار القاموس أو الخريطة من المستودع.";
    });
});

// دالة المطابقة الذكية: تبحث عن الـ ID داخل ملف القاموس وتستخرج حقل الـ label
function getLabelFromDictionary(id) {
    if (dictionaryData[id] && dictionaryData[id].label) {
        return dictionaryData[id].label;
    }
    return id; 
}

function requestFullScreen() {
    const docElm = document.documentElement;
    if (docElm.requestFullscreen) docElm.requestFullscreen();
    else if (docElm.mozRequestFullScreen) docElm.mozRequestFullScreen();
    else if (docElm.webkitRequestFullScreen) docElm.webkitRequestFullScreen();
    else if (docElm.msRequestFullscreen) docElm.msRequestFullscreen();
    document.body.classList.add('fullscreen-mode');
}

function exitFullScreen() {
    if (document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement) {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
    document.body.classList.remove('fullscreen-mode');
}

function clearActive(containerId) {
    const buttons = document.querySelectorAll(`#${containerId} button`);
    buttons.forEach(b => b.classList.remove('active-selection'));
}

// 1. بناء أزرار الشعب أو الفروع (Branches)
function renderBranches() {
    const list = document.getElementById('branches-list');
    list.innerHTML = "";
    
    const branchesIds = Object.keys(navigationData);
    
    branchesIds.sort().forEach(branchId => {
        const btn = document.createElement('button');
        btn.textContent = getLabelFromDictionary(branchId); 
        btn.className = "btn-branch";
        btn.onclick = (e) => { 
            clearActive('branches-list'); 
            e.target.classList.add('active-selection'); 
            renderModules(branchId); 
        };
        list.appendChild(btn);
    });
}

// 2. بناء أزرار المواد (Modules)
function renderModules(branchId) {
    const list = document.getElementById('modules-list');
    // تصفية وتصفير كامل للمستويات الأدنى فور اختيار فرع جديد
    list.innerHTML = ""; 
    document.getElementById('axes-list').innerHTML = "";
    document.getElementById('exercises-section').style.display = "none";
    document.getElementById('viewer').style.display = "none";
    
    const branchObj = navigationData[branchId];
    if (!branchObj || !branchObj.modules) return;
    
    branchObj.modules.forEach(mod => {
        const btn = document.createElement('button');
        btn.textContent = getLabelFromDictionary(mod.module_id); 
        btn.className = "btn-mod";
        btn.onclick = (e) => { 
            clearActive('modules-list'); 
            e.target.classList.add('active-selection'); 
            renderAxes(mod.axes); 
        };
        list.appendChild(btn);
    });
}

// 3. بناء أزرار المحاور الأساسية (Axes)
function renderAxes(axesArray) {
    const list = document.getElementById('axes-list');
    // تصفير وتنظيف كامل لما هو أسفل المحاور بمجرد النقر والتبديل بين المواد
    list.innerHTML = ""; 
    document.getElementById('exercises-section').style.display = "none";
    document.getElementById('viewer').style.display = "none";
    
    if (!axesArray) return;
    
    axesArray.forEach(axe => {
        const btn = document.createElement('button');
        btn.textContent = getLabelFromDictionary(axe.axe_id); 
        btn.className = "btn-axes";
        btn.onclick = (e) => { 
            clearActive('axes-list'); 
            e.target.classList.add('active-selection'); 
            currentAxeLabel = getLabelFromDictionary(axe.axe_id); 
            renderExercises(axe); 
        };
        list.appendChild(btn);
    });
}

// 4. استخراج وعرض التمارين المتواجدة داخل المحطات (Milestones) للمحور المختار
function renderExercises(axeObj) {
    const list = document.getElementById('exercises-list
