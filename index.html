<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmax Bac | لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0f2027; 
            --accent-blue: #3498db;
            --pure-gold: #D4AF37;
            --white-fade: rgba(255, 255, 255, 0.45);
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; 
            height: 100vh;
            width: 100%;
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at center, #203a43 0%, #0f2027 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center; 
            overflow: hidden; 
        }

        .main-wrapper { 
            text-align: center; 
            width: 100%;
            max-width: 480px; 
            padding: 15px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .master-logo { margin-bottom: 5px; width: 100%; } 
        .logo-text {
            font-size: clamp(3.5em, 12vw, 5em); 
            font-weight: 900;
            margin: 0;
            line-height: 0.85;
            letter-spacing: 5px;
        }
        .max-text { color: var(--pure-gold); text-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        .hub-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 5px;
        }
        .hub-line {
            width: 180px;
            height: 2px;
            background: rgba(212, 175, 55, 0.3);
            margin-bottom: 5px;
        }
        .hub-tag {
            font-size: 1.5em;
            letter-spacing: 12px;
            text-indent: 12px;
            color: var(--accent-blue); 
            font-weight: 900;
        }

        .status-tag { 
            font-size: 0.75em; 
            color: #2ecc71; 
            margin: 5px 0 2px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-weight: 700;
        }
        .status-dot {
            width: 6px; height: 6px;
            background-color: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 6px #2ecc71;
        }

        /* تفاصيل المرحلة الدراسية - خط صغير وخفيف */
        .academic-info {
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
            font-weight: 400;
        }

        .menu-container {
            width: 100%;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px; 
        }

        .gmax-btn {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px 15px; 
            color: #ffffff;
            font-size: 1.1em; 
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center; 
            transition: all 0.2s ease;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .gmax-btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.06);
        }

        .section-divider {
            width: 50%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            margin: 15px 0;
            align-self: center;
        }

        .tool-btn:hover {
            border-color: var(--pure-gold);
        }

        .dynamic-content-area {
            width: 100%;
            margin-top: 15px;
        }

        @media (max-width: 480px) {
            .logo-text { font-size: 3.5em; }
            .gmax-btn { font-size: 1em; padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="master-logo">
            <h1 class="logo-text">
                <span>G</span><span class="max-text">MAX</span>
            </h1>            
            <div class="hub-area">
                <div class="hub-line"></div>
                <span class="hub-tag">BAC</span>
            </div>            
            
            <div class="academic-info">المرحلة الثانوية • بكالوريا 2027 • شعب علمية</div>
        </div>

        <div class="menu-container" id="mainMenuContainer">
            
            <a href="exercises.html" class="gmax-btn">
    <span>🏋️ التمارين</span>
</a>

            <div class="section-divider"></div>

            <a href="anki_view.html" class="gmax-btn tool-btn">
                <span>🧠 التكرار المتباعد</span>
            </a>

            <a href="progress_view.html" class="gmax-btn tool-btn">
                <span>📊 تقدماتي</span>
            </a>

        </div>

        <div class="dynamic-content-area" id="dynamicContent"></div>

    </div>

    
</body>
</html>
